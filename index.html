<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>んだっす - プロフィール設定</title>
    <style>
        /* 💡 んだっす専用のプロっぽいシンプルデザインCSS */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .profile-container {
            max-width: 400px;
            margin: 50px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
        }
        .btn-save {
            width: 100%;
            background-color: #2ecc71;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-save:hover {
            background-color: #27ae60;
        }
        .logout-section {
            text-align: center;
            margin-top: 30px;
            border-top: 1px solid #edf2f7;
            padding-top: 20px;
        }
        .btn-logout {
            width: 100%;
            background-color: #ff4d4d;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-logout:hover {
            background-color: #e60000;
        }
        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div class="profile-container">
        <h2>プロフィール設定だす</h2>
        
        <div class="form-group">
            <label for="nicknameInput">ニックネーム（あだ名）</label>
            <input type="text" id="nicknameInput" placeholder="例：あきた太郎">
        </div>
        
        <button id="saveBtn" class="btn-save">設定を保存するべ</button>

        <div class="logout-section">
            <button id="logoutBtn" class="btn-logout">ログアウト</button>
        </div>
    </div>

    <footer>
        © 2026 んだっす <span id="version-tag">v0.4.0-alpha</span>
    </footer>

    <script>
        // 画面が読み込まれたらスタート
        document.addEventListener('DOMContentLoaded', () => {
            // 1. すでに保存されているニックネームがあれば入力欄に表示する
            const savedNickname = localStorage.getItem('nda_nickname');
            if (savedNickname) {
                document.getElementById('nicknameInput').value = savedNickname;
            }

            // 2. 「保存ボタン」を押したときの処理
            document.getElementById('saveBtn').addEventListener('click', () => {
                const inputVal = document.getElementById('nicknameInput').value.trim();
                
                if (inputVal === '') {
                    alert('名前を入力してけれ！');
                    return;
                }

                // ローカルストレージに保存
                localStorage.setItem('nda_nickname', inputVal);
                alert('保存したっす！タイムラインへ投稿できるようになりました！');
            });

            // 3. 「ログアウトボタン」を押したときの処理
            document.getElementById('logoutBtn').addEventListener('click', () => {
                const confirmLogout = confirm('本当にログアウトするべが？');
                
                if (confirmLogout) {
                    // 保存されているデータを削除してアプリを初期化
                    localStorage.removeItem('nda_nickname');
                    
                    alert('ログアウトしたっす！また来てねの〜👋');
                    
                    // 画面をリロードして未ログイン状態に戻す
                    window.location.reload();
                }
            });
        });
    </script>
</body>
</html>
